<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Diary - Catat Perasaanmu! 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            transition: all 0.5s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Mood Background Colors */
        .mood-happy { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%) !important; }
        .mood-sad { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%) !important; }
        .mood-angry { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%) !important; }
        .mood-calm { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%) !important; }
        .mood-excited { background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%) !important; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            position: relative;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbow 3s ease-in-out infinite alternate;
            margin-bottom: 10px;
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .tagline {
            font-size: 1.2rem;
            color: white;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .nav-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .nav-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            background: rgba(255,255,255,0.3);
        }

        .nav-btn.active {
            background: rgba(255,255,255,0.9);
            color: #333;
            transform: scale(1.1);
        }

        section {
            display: none;
            animation: fadeIn 0.8s ease;
        }

        section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Home Section */
        .home-content {
            text-align: center;
            color: white;
        }

        .home-title {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .mood-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 40px 0;
        }

        .mood-btn {
            padding: 20px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mood-happy-btn { 
            background: linear-gradient(45deg, #ffecd2, #fcb69f); 
            color: #d68910;
            box-shadow: 0 15px 40px rgba(252, 182, 159, 0.4);
        }
        .mood-sad-btn { 
            background: linear-gradient(45deg, #a8edea, #fed6e3); 
            color: #6c5ce7;
            box-shadow: 0 15px 40px rgba(254, 214, 227, 0.4);
        }
        .mood-angry-btn { 
            background: linear-gradient(45deg, #ff9a9e, #fecfef); 
            color: #e17055;
            box-shadow: 0 15px 40px rgba(255, 154, 158, 0.4);
        }
        .mood-calm-btn { 
            background: linear-gradient(45deg, #a1c4fd, #c2e9fb); 
            color: #0984e3;
            box-shadow: 0 15px 40px rgba(194, 233, 251, 0.4);
        }
        .mood-excited-btn { 
            background: linear-gradient(45deg, #ffeaa7, #fab1a0); 
            color: #fdcb6e;
            box-shadow: 0 15px 40px rgba(250, 177, 160, 0.4);
        }

        .mood-btn:hover {
            transform: translateY(-12px) scale(1.08);
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
        }

        /* MODAL POPUP */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            animation: modalFadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: rgba(255,255,255,0.98);
            margin: 20px;
            padding: 40px;
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 100px rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            transform: scale(0.7);
            animation: modalPop 0.4s ease forwards;
            position: relative;
        }

        @keyframes modalPop {
            to {
                transform: scale(1);
            }
        }

        .modal-emoji {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 15px;
        }

        .modal-question {
            font-size: 1.3rem;
            color: #636e72;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .modal-textarea {
            width: 100%;
            padding: 20px;
            border: 3px solid #e1e8ed;
            border-radius: 20px;
            font-size: 1.1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .modal-textarea:focus {
            outline: none;
            border-color: #a29bfe;
            box-shadow: 0 0 0 4px rgba(162, 155, 254, 0.15);
            transform: translateY(-2px);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-save {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
            min-width: 120px;
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,107,107,0.6);
        }

        .btn-skip {
            background: rgba(255,255,255,0.8);
            color: #636e72;
            border: 2px solid #e1e8ed;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn-skip:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        /* Gallery Section */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .diary-card {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }

        .diary-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            transition: all 0.3s ease;
        }

        .diary-card.happy::before { background: linear-gradient(90deg, #ffecd2, #fcb69f); }
        .diary-card.sad::before { background: linear-gradient(90deg, #a8edea, #fed6e3); }
        .diary-card.angry::before { background: linear-gradient(90deg, #ff9a9e, #fecfef); }
        .diary-card.calm::before { background: linear-gradient(90deg, #a1c4fd, #c2e9fb); }
        .diary-card.excited::before { background: linear-gradient(90deg, #ffeaa7, #fab1a0); }

        .diary-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 30px 80px rgba(0,0,0,0.25);
        }

        .mood-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .mood-happy .mood-icon { color: #fdcb6e; }
        .mood-sad .mood-icon { color: #74b9ff; }
        .mood-angry .mood-icon { color: #e17055; }
        .mood-calm .mood-icon { color: #00b894; }
        .mood-excited .mood-icon { color: #fd79a8; }

        .diary-date {
            color: #636e72;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .diary-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #2d3436;
        }

        .diary-content {
            color: #636e72;
            line-height: 1.7;
        }

        /* Add Diary Form */
        .add-diary {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 40px;
            margin: 40px 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
        }

        /* About Section - sama seperti sebelumnya */
        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .mood-buttons {
                flex-direction: column;
                align-items: center;
            }
            .gallery {
                grid-template-columns: 1fr;
            }
            .about-content {
                grid-template-columns: 1fr;
            }
            .modal-buttons {
                flex-direction: column;
            }
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .heart {
            position: absolute;
            color: #ff6b9d;
            font-size: 20px;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body class="mood-calm">
    <!-- Floating Hearts -->
    <div class="floating-hearts" id="hearts"></div>
    
    <!-- Mood Selection Modal -->
    <div id="moodModal" class="modal">
        <div class="modal-content">
            <div class="modal-emoji" id="modalEmoji"></div>
            <h2 class="modal-title" id="modalTitle"></h2>
            <p class="modal-question" id="modalQuestion"></p>
            <textarea class="modal-textarea" id="modalReason" placeholder="Ceritakan alasannya..."></textarea>
            <div class="modal-buttons">
                <button class="btn-save" onclick="saveMoodReason()">💾 Simpan</button>
                <button class="btn-skip" onclick="skipMoodReason()">⏭️ Skip</button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <header>
            <h1 class="logo">💖 MoodDiary</h1>
            <p class="tagline">Catat setiap perasaanmu dengan warna yang ceria! ✨</p>
            
            <nav>
                <button class="nav-btn active" onclick="showSection('home')">🏠 Home</button>
                <a href="gallery.html" class="nav-btn">📸 Gallery</a>
            </nav>
        </header>

        <!-- Home Section -->
        <section id="home" class="active">
            <div class="home-content">
                <h2 class="home-title">Bagaimana mood kamu hari ini? 🌈</h2>
                <p style="font-size: 1.3rem; margin-bottom: 40px; opacity: 0.9;">
                    Pilih mood kamu dan ceritakan alasannya! ✨
                </p>
                
                <div class="mood-buttons">
                    <button class="mood-btn mood-happy-btn" onclick="showMoodModal('happy', '😊', 'Senang', 'Apa yang membuatmu senang hari ini?')">
                        😊 Senang
                    </button>
                    <button class="mood-btn mood-sad-btn" onclick="showMoodModal('sad', '😢', 'Sedih', 'Apa yang membuatmu sedih hari ini?')">
                        😢 Sedih
                    </button>
                    <button class="mood-btn mood-angry-btn" onclick="showMoodModal('angry', '😣', 'Marah', 'Apa yang membuatmu marah hari ini?')">
                        😣 Marah
                    </button>
                    <button class="mood-btn mood-calm-btn" onclick="showMoodModal('calm', '😌', 'Tenang', 'Apa yang membuatmu tenang hari ini?')">
                        😌 Tenang
                    </button>
                    <button class="mood-btn mood-excited-btn" onclick="showMoodModal('excited', '🎉', 'Excited', 'Apa yang membuatmu excited hari ini?')">
                        🎉 Excited
                    </button>
                </div>
            </div>
        </section>  
    </div>

    <script>
        let selectedMood = "";
        let selectedEmoji = "";
        let selectedTitle = "";

        // TAMPILKAN MODAL
        function showMoodModal(mood, emoji, title, question) {
            selectedMood = mood;
            selectedEmoji = emoji;
            selectedTitle = title;

            document.getElementById("modalEmoji").innerText = emoji;
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalQuestion").innerText = question;

            document.getElementById("moodModal").classList.add("active");
        }

        // SIMPAN & KE GALLERY
        function saveMoodReason() {
            const reason = document.getElementById("modalReason").value;

            // simpan ke localStorage (biar bisa dipakai di gallery)
            const data = {
                mood: selectedMood,
                emoji: selectedEmoji,
                title: selectedTitle,
                reason: reason,
                date: new Date().toLocaleDateString("id-ID")
            };

            localStorage.setItem("lastMood", JSON.stringify(data));

            // pindah ke gallery
            window.location.href = "gallery.html";
        }

        // SKIP LANGSUNG KE GALLERY
        function skipMoodReason() {
            window.location.href = "gallery.html";
        }

        // TUTUP MODAL KALO KLIK LUAR
        window.onclick = function(e) {
            const modal = document.getElementById("moodModal");
            if (e.target === modal) {
                modal.classList.remove("active");
            }
        }
    </script>
</body>
